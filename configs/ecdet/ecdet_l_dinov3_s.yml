__include__: [
  '../dataset/coco.yml',
  'ecdet.yml',
]

output_dir: outputs/ecdet_l_dinov3_s

ECDet:
  backbone: DINOv3Adapter
  encoder: HybridEncoder
  decoder: ECTransformer

DINOv3Adapter:
  name: dinov3_vits16
  pretrained: True
  weights_path: weights/dinov3_vits16.pth
  embed_dim: 384
  proj_dim: 256
  out_indices: [5, 8, 11]
  patch_size: 16
  out_strides: [8, 16, 32]
  frozen_stages: -1
  use_checkpoint: True
  drop_path_rate: 0.1

HybridEncoder:
  in_channels: [256, 256, 256]
  depth_mult: 1
  expansion: 0.75
  hidden_dim: 256
  dim_feedforward: 1024

ECTransformer:
  feat_channels: [256, 256, 256]
  hidden_dim: 256
  dim_feedforward: 1024
  num_layers: 4
  eval_idx: -1

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*.backbone)(?!.*(?:norm|bn|bias)).*$'
      lr: 0.000005
    -
      params: '^(?=.*.backbone)(?=.*(?:norm|bn|bias)).*$'
      lr: 0.000005
      weight_decay: 0.
    -
      params: '^(?!.*\.backbone)(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.000125

epochs: 50
warmup_iter: 2000
lr_gamma: 0.5

eval_spatial_size: [640, 640]

train_dataloader:
  dataset:
    transforms:
      mosaic_epoch: 24
      mosaic_prob: 1
      stop_epoch: 48

  collate_fn:
    mixup_prob: 1
    mixup_epoch: 24
