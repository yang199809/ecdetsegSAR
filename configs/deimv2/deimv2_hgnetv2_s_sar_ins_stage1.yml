__include__: [
  '../dataset/sar_instance_segmentation.yml',
  '../runtime.yml',
  '../base/dataloader.yml',
  '../base/optimizer.yml',
  '../base/deimv2.yml'
]

model: DEIMv2_SAR_INS_STAGE1
criterion: SARStage1Criterion
postprocessor: SARInstancePostProcessor
output_dir: ./outputs/deimv2_hgnetv2_s_sar_ins_stage1

num_classes: 1
eval_spatial_size: [640, 640]

DEIMv2_SAR_INS_STAGE1:
  backbone: HGNetv2
  encoder: HybridEncoder
  decoder:
    type: SARStage1DEIMTransformer
    feat_channels: [256, 256, 256]
    feat_strides: [8, 16, 32]
    hidden_dim: 256
    num_levels: 3
    num_layers: 3
    eval_idx: -1
    num_queries: 300
    num_denoising: 100
    label_noise_ratio: 0.5
    box_noise_scale: 1.0
    reg_max: 32
    reg_scale: 4
    layer_scale: 1
    num_points: [3, 6, 3]
    cross_attn_method: default
    query_select_method: default
    activation: silu
    mlp_act: silu
    dim_feedforward: 2048
    mask_hidden_dim: 128
    mask_output_stride: 4
    mask_num_blocks: 3
    use_mask_aux_loss: True
    use_sparse_mask_train: False
    use_weak_geometry: False
    return_geometry: False
    enable_timing: True
    timing_sync_cuda: False

HGNetv2:
  name: 'B0'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True

HybridEncoder:
  in_channels: [256, 512, 1024]
  hidden_dim: 256
  depth_mult: 0.34
  expansion: 0.5
  version: 'dfine'

SARInstancePostProcessor:
  num_top_queries_bbox: 300
  num_top_queries_segm: 100
  category_id_offset: 1
  return_geometry: False
  debug: False
  debug_dir: ./outputs/deimv2_hgnetv2_s_sar_ins_stage1/debug_val
  debug_max_images: 5
  mask_threshold: 0.5
  enable_timing: True
  timing_sync_cuda: False

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*bn).*$'
      lr: 0.0002
    -
      params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.
  lr: 0.0004
  betas: [0.9, 0.999]
  weight_decay: 0.0001

epoches: 132
flat_epoch: 64
no_aug_epoch: 12

train_dataloader:
  total_batch_size: 32
  dataset:
    return_masks: True
    return_weak_geometry: False
    use_category2label: True
    transforms:
      ops:
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy: ~
      mosaic_prob: -0.1
  collate_fn:
    base_size: 640
    base_size_repeat: ~
    mixup_prob: 0.0
    mixup_epochs: [100000, 100000]
    copyblend_prob: 0.0
    copyblend_epochs: [100000, 100000]
    stop_epoch: 120
    ema_restart_decay: 0.9999

val_dataloader:
  total_batch_size: 64
  dataset:
    return_masks: True
    return_weak_geometry: False
    use_category2label: True
    transforms:
      ops:
        - {type: Resize, size: [640, 640]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
  shuffle: False

SARStage1Criterion:
  weight_dict: {
    loss_mal: 2.0,
    loss_bbox: 1,
    loss_giou: 1,
    loss_fgl: 0.15,
    loss_ddf: 1.5,
    loss_mask_bce: 5.0,
    loss_mask_dice: 5.0
  }
  losses: ['mal', 'boxes', 'local', 'masks']
  gamma: 1.5
  alpha: 0.75
  reg_max: 32
  mask_diagnostics: True
  mask_diagnostics_interval: 50
  mask_point_sample_ratio: 16
  oversample_ratio: 3.0
  importance_sample_ratio: 0.75
  mask_gt_sample_ratio: 0.5
  mask_gt_fg_sample_ratio: 0.75
  mask_min_sampled_points: 256
  mask_max_sampled_points: 1024
  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 1, cost_giou: 1, cost_mask_bce: 1.0, cost_mask_dice: 1.0}
    alpha: 0.25
    gamma: 2.0
    mask_cost_downsample_size: ~
    mask_point_sample_ratio: 16
    mask_min_sampled_points: 256
    mask_max_sampled_points: 1024
    mask_gt_fg_sample_ratio: 0.5
    mask_cost_valid_area_eps: 1.0e-6
    diagnostics: True
    diagnostics_interval: 50
    change_matcher: True
    iou_order_alpha: 4.0
    matcher_change_epoch: 100
