__include__: [
  '../dataset/sardet100k.yml',
  'ecdet.yml',
]

output_dir: outputs/ecdet_l_dinov3_s

ECDet:
  backbone: DINOv3STAs
  encoder: HybridEncoder
  decoder: ECTransformer

DINOv3STAs:
  name: dinov3_vits16
  embed_dim: 256
  weights_path: /home/yangshuang/EdgeCrafter-main/ecdetsegSAR-codex-dinov3-ecdet-l/ecvits/dinov3_vits16_pretrain_lvd1689m-08c60483.pth
  interaction_indexes: [5,8,11]   # only need the [1/8, 1/16, 1/32]
  finetune: True
  conv_inplane: 32
  hidden_dim: 256

HybridEncoder:
  in_channels: [256, 256, 256]
  depth_mult: 1
  expansion: 0.75
  hidden_dim: 256
  dim_feedforward: 1024

ECTransformer:
  feat_channels: [256, 256, 256]
  hidden_dim: 256
  dim_feedforward: 1024
  num_layers: 4
  eval_idx: -1

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*.backbone)(?!.*(?:norm|bn|bias)).*$'
      lr: 0.00002
    -
      params: '^(?=.*.backbone)(?=.*(?:norm|bn|bias)).*$'
      lr: 0.00002
      weight_decay: 0.
    -
      params: '^(?!.*\.backbone)(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0004
  betas: [0.9, 0.999]
  weight_decay: 0.0001

epochs: 74
warmup_iter: 2000
lrsheduler: flatcosine
lr_gamma: 0.5
flat_epoch: ~

eval_spatial_size: [640, 640] # h w

train_dataloader:
  dataset:
    transforms:
      ops:
        - {type: Mosaic, output_size: 320, rotation_range: 10, translation_range: [0.1, 0.1], scaling_range: [0.5, 1.5],
           fill_value: 0, max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640], }
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}

      policy: stop_epoch  # close augmention at certain epoch

      # Mosaic options
      mosaic_epoch: 36
      mosaic_prob: 0.75
      stop_epoch: 72

      # remove strong augmentations after at no_aug_epoch
      remove_ops: ['Mosaic', 'RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop', ]

  collate_fn:
    type: BatchImageCollateFunction
    # Mixup options
    mixup_prob: 0.75
    mixup_epoch: 36

  shuffle: True
  total_batch_size: 16 # total batch size equals to 32 (4 * 8)
  num_workers: 4


val_dataloader:
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [640, 640], }
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
      policy: default
  shuffle: False
  total_batch_size: 32
  num_workers: 4
