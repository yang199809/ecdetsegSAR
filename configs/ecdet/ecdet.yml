task: detection

model: ECDet
criterion: ECCriterion
postprocessor: PostProcessor

use_focal_loss: True
checkpoint_freq: 5    # save freq


####################################################### MODEL CONFIG ########################################################

ECDet:
  backbone: ViTAdapter
  encoder: HybridEncoder
  decoder: ECTransformer

HybridEncoder:
  in_channels: [192, 192, 192]
  feat_strides: [8, 16, 32]

  # intra
  hidden_dim: 256
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.

  # cross
  expansion: 1.0
  depth_mult: 1
  act: silu

  # New
  csp_type: csp2
  fuse_op: sum

ECTransformer:
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  num_levels: 3

  num_layers: 4
  eval_idx: -1
  num_queries: 300

  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0

  reg_max: 32
  reg_scale: 4
  layer_scale: 1  # 2

  num_points: [3, 6, 3] # [4, 4, 4] [3, 6, 3]
  cross_attn_method: default # default, discrete
  query_select_method: default # default, agnostic

  # Act
  activation: silu

  # FFN
  dim_feedforward: 2048

PostProcessor:
  num_top_queries: 300

## Loss
ECCriterion:
  weight_dict: {loss_mal: 1, loss_bbox: 5, loss_giou: 2, loss_fgl: 0.15, loss_ddf: 1.5}
  losses: ['mal', 'boxes', 'local']
  gamma: 1.5
  alpha: 0.75
  reg_max: 32

  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0



####################################################### DATALOADER ########################################################

eval_spatial_size: [800, 800] # h w

train_dataloader: 
  dataset: 
    transforms:
      ops:
        - {type: Mosaic, output_size: 400, rotation_range: 10, translation_range: [0.1, 0.1], scaling_range: [0.5, 1.5],
           fill_value: 0, max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [800, 800], }
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}

      policy: stop_epoch  # close augmention at certain epoch

      # Mosaic options
      mosaic_epoch: 36
      mosaic_prob: 0.5
      stop_epoch: 60

      # remove strong augmentations after at no_aug_epoch 
      remove_ops: ['Mosaic', 'RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop', ]
      
  collate_fn:
    type: BatchImageCollateFunction
    # Mixup options
    mixup_prob: 0.5
    mixup_epoch: 36

  shuffle: True
  total_batch_size: 4 # total batch size equals to 32 (4 * 8)
  num_workers: 4


val_dataloader:
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [800, 800], }
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
      policy: default
  shuffle: False
  total_batch_size: 16
  num_workers: 4



####################################################### TRAINING CONFIG ########################################################

print_freq: 500
output_dir: './logs'

sync_bn: True
find_unused_parameters: False

use_amp: True
scaler:
  type: GradScaler
  enabled: True

use_ema: True
ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 1000
  start: 0

clip_max_norm: 0.1

####################################################### OPTIMIZER & LR-SCHEDULER ########################################################

optimizer:
  type: AdamW

  params: 
    -
      params: '^(?=.*.backbone)(?!.*(?:norm|bn|bias)).*$'  
      lr: 0.000025
    -
      params: '^(?=.*.backbone)(?=.*(?:norm|bn|bias)).*$'    
      lr: 0.000025
      weight_decay: 0.
    - 
      params: '^(?!.*\.backbone)(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.0001


## LR-Scheduler
epochs: 62 # 5x (1x for 12 epochs) + 2(no_aug_epoch)

lrsheduler: flatcosine
lr_gamma: 0.5
warmup_iter: 2000
flat_epoch: ~    