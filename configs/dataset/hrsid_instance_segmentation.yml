task: instance_segmentation

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', 'segm']

num_classes: 1
remap_mscoco_category: False
category_id_offset: 1

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: ./data/HRSID/images/train
    ann_file: ./data/HRSID/annotations/instances_train.json
    return_masks: True
    category_id_offset: 1
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction

val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: ./data/HRSID/images/val
    ann_file: ./data/HRSID/annotations/instances_val.json
    return_masks: True
    category_id_offset: 1
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
