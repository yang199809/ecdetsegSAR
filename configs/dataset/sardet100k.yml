task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]
  verbose: False

num_classes: 4 # your dataset classes
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /home/yangshuang/EdgeCrafter-main/ecdetseg/data/SARDet/images/train
    ann_file: /home/yangshuang/EdgeCrafter-main/ecdetseg/data/SARDet/annotations_fix/train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction


val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /home/yangshuang/EdgeCrafter-main/ecdetseg/data/SARDet/images/val
    ann_file: /home/yangshuang/EdgeCrafter-main/ecdetseg/data/SARDet/annotations_fix/val.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
