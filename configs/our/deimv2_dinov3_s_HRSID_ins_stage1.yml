__include__: [
  '../dataset/hrsid_instance_segmentation.yml',
  '../runtime.yml',
  '../base/dataloader.yml',
  '../base/optimizer.yml',
  '../base/deimv2.yml'
]

output_dir: ./outputs/deimv2_dinov3_s_hrsid_ins_stage1

model: DEIMv2_SAR_INS_STAGE1
criterion: SARStage1Criterion
postprocessor: SARInstancePostProcessor

DEIMv2_SAR_INS_STAGE1:
  backbone: DINOv3STAs
  encoder: HybridEncoder
  decoder: SARStage1DEIMTransformer

DINOv3STAs:
  name: vit_tiny
  embed_dim: 192
  weights_path: ./ckpts/vitt_distill.pt
  interaction_indexes: [3, 7, 11]
  num_heads: 3

HybridEncoder:
  in_channels: [192, 192, 192]
  feat_strides: [8, 16, 32]
  depth_mult: 0.67
  expansion: 0.34
  hidden_dim: 192
  dim_feedforward: 512

SARStage1DEIMTransformer:
  feat_channels: [192, 192, 192]
  feat_strides: [8, 16, 32]
  hidden_dim: 192
  dim_feedforward: 512
  num_layers: 4
  eval_idx: -1
  num_queries: 300
  num_levels: 3
  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0
  reg_max: 32
  reg_scale: 4
  layer_scale: 1
  num_points: [3, 6, 3]
  cross_attn_method: default
  query_select_method: default
  activation: silu
  mlp_act: silu
  mask_hidden_dim: 128
  mask_output_stride: 4
  mask_num_blocks: 4
  use_multiscale_mask_fusion: False
  use_mask_aux_loss: True
  use_sparse_mask_train: False

SARInstancePostProcessor:
  num_top_queries: 300
  num_top_masks: 100
  mask_threshold: 0.5

eval_spatial_size: [800, 800]

optimizer:
  type: AdamW
  params:
    - {params: '^(?=.*.dinov3)(?!.*(?:norm|bn|bias)).*$', lr: 0.000025}
    - {params: '^(?=.*.dinov3)(?=.*(?:norm|bn|bias)).*$', lr: 0.000025, weight_decay: 0.}
    - {params: '^(?=.*(?:sta|encoder|decoder|mask_head))(?=.*(?:norm|bn|bias)).*$', weight_decay: 0.}
  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.0001

epoches: 132
flat_epoch: 64
no_aug_epoch: 12

train_dataloader:
  dataset:
    return_masks: True
    transforms:
      ops:
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [800, 800]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        name: stop_epoch
        epoch: 120
        ops: ['RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop']
  collate_fn:
    base_size: 800
    base_size_repeat: ~
    mixup_prob: 0.0
    copyblend_prob: 0.0

val_dataloader:
  dataset:
    return_masks: True
    transforms:
      ops:
        - {type: Resize, size: [800, 800]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}

SARStage1Criterion:
  weight_dict:
    loss_mal: 2.0
    loss_bbox: 1
    loss_giou: 1
    loss_fgl: 0.15
    loss_ddf: 1.5
    loss_mask_bce: 5.0
    loss_mask_dice: 5.0
  losses: ['mal', 'boxes', 'local', 'masks']
  gamma: 1.5
  alpha: 0.75
  reg_max: 32
  mask_point_sample_ratio: 16
  oversample_ratio: 3.0
  importance_sample_ratio: 0.75
  mask_min_sampled_points: 256
  mask_max_sampled_points: 1024
  matcher:
    type: HungarianMatcher
    weight_dict:
      cost_class: 2
      cost_bbox: 1
      cost_giou: 1
      cost_mask_bce: 1.0
      cost_mask_dice: 1.0
    alpha: 0.25
    gamma: 2.0
    mask_point_sample_ratio: 16
    mask_min_sampled_points: 128
    mask_max_sampled_points: 512
    mask_cost_start_epoch: 5
    mask_cost_warmup_epochs: 10
    mask_cost_warmup_mode: linear
    change_matcher: False
